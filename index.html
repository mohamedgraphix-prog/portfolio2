       :root {

        body {

        /* حركات الصفحة الرئيسية */
        .top-slide, .bottom-slide {

        }
        body:not(.active-home) .top-slide { transform: translateY(-100%); }
        body:not(.active-home) .bottom-slide { transform: translateY(100%); }
.mesh-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: 
        radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(37, 99, 235, 0.08) 0%, transparent 40%);
    overflow: hidden;
}

/* طبقة التشويش (Grainy Effect) */
.mesh-bg::after {
    content: "";
    position: absolute;
    width: 200%; height: 200%;
    top: -50%; left: -50%;
    background-image: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.15;
    pointer-events: none;
}
        /* صفحات الموقع */
        .page {
            position: absolute;
            inset: 0;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 10;
        }
        .page.active {
            display: flex;
            opacity: 1;
        }

        /* حركة المجرة */
        .galaxy-container {
            position: absolute;
            width: 600px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: galaxyRotate 60s linear infinite;
        }

        @keyframes galaxyRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .galaxy-item {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #000;
            transform: translate(-50%, -50%);
        }

        .galaxy-item img {
            width: 100%; height: 100%; object-fit: cover;
            animation: galaxyRotate 60s linear infinite reverse;
        }

        .galaxy-item:hover {
            transform: translate(-50%, -50%) scale(1.3) !important;
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent);
            z-index: 100;
        }

        /* النافذة الشفافة (Lightbox) */
        .glass-modal {
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
        }

        /* التنقل السفلي */
        .nav-bar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
        }
        .nav-item.active {
            background: white;
            color: black;
            box-shadow: 0 0 25px rgba(255,255,255,0.4);
        }

        /* أيقونات السوشيال ميديا النيون */
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 15px;

            font-size: 1.2rem;
            transition: 0.3s;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .social-btn:hover { transform: scale(1.1) translateX(-5px); }

        @media (max-width: 768px) {

    }
];

        let currentIdx = 0;
        let likedIds = new Set();

        function buildGalaxy() {
            const galaxy = document.getElementById('galaxy');
            galaxy.innerHTML = '';
            const radius = window.innerWidth < 768 ? 130 : 250;
            
            works.forEach((w, i) => {
                const angle = (i / works.length) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                
                const div = document.createElement('div');
                div.className = 'galaxy-item';
                div.style.left = `calc(50% + ${x}px)`;
                div.style.top = `calc(50% + ${y}px)`;
                div.innerHTML = `<img src="${w.img}" alt="">`;
                div.onclick = () => openLightbox(i);
                galaxy.appendChild(div);
            });
        }

        function navTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.body.className = 'active-' + pageId;
            document.getElementById(pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
            if(pageId === 'works') buildGalaxy();
        }

        function openLightbox(index) {
            currentIdx = index;
            document.getElementById('lightbox').style.display = 'flex';
            updateLightbox();
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function updateLightbox() {
            const work = works[currentIdx];
            document.getElementById('lb-img').src = work.img;
            document.getElementById('lb-title').innerText = work.title;
            
            // تحديث لينك الواتساب
            const msg = encodeURIComponent(`أعجبني تصميم "${work.title}" وأريد طلب تصميم مشابه.`);
            document.getElementById('order-link').href = `https://wa.me/201026402450?text=${msg}`;
            
            // تحديث حالة القلب
            const likeBtn = document.getElementById('like-btn');
            if(likedIds.has(work.id)) {
                likeBtn.classList.add('text-red-500');
                likeBtn.classList.remove('text-white/20');
            } else {
                likeBtn.classList.remove('text-red-500');
                likeBtn.classList.add('text-white/20');
            }
        }

        function toggleLike() {
            const id = works[currentIdx].id;
            if(likedIds.has(id)) likedIds.delete(id);
            else likedIds.add(id);
            updateLightbox();
        }

        function nextImg() { currentIdx = (currentIdx + 1) % works.length; updateLightbox(); }
        function prevImg() { currentIdx = (currentIdx - 1 + works.length) % works.length; updateLightbox(); }

        window.onload = buildGalaxy;
        window.onresize = buildGalaxy;
    </script>
